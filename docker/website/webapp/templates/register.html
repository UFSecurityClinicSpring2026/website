<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="/static/styles.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register - Florida Security Clinic</title>
</head>
<body>
  {% include 'header.html' %}
  <h1 class="page_title">Register</h1>
  <p>
    <form action="/register" method="post">
      <p><label for="username">Username: </label><input type="text" id="username" name="username"></p>
		  <p><label for="first name">First Name: </label><input type="text" id="first_name" name="first_name"></p>
		  <p><label for="last name">Last Name: </label><input type="text" id="last_name" name="last_name"></p>
		  <p><label for="password">Password: </label><input type="text" id="password" name="password"></p>
      <p>
        <label for="type">I am a: </label>
        <select name="selection" id="selection">
          <option value="client">Client</option>
          <option value="student">Student</option>
        </select>
      </p>
		  <p><input type="submit" value="Submit"></p>
    </form>
  </p>
</body>
