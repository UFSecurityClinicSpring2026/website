<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="/static/styles.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>New Ticket - Florida Security Clinic</title>
</head>
<body>
  {% include 'header.html' %}
	<h1 class="page_title">New Ticket</h1>
	<p>We're happy to have you here and are glad you're willing to take the 
     next step of your cybersecurity journey with us. If you have any questions 
     or concerns, fill out the following form and one of our volunteers will
     get back to you as soon as possible.</p>
	<form action="/dashboard/tickets/new" method="post">
		<p><label for="title">Title: </label><input type="text" id="title" name="title"></p>
		<p>
			<label for="message">Message: </label><br />
			<textarea id="message" name="message"></textarea>
		</p>
		<p><input type="submit" value="Submit"></p>
	</form>
</body>
</html>
