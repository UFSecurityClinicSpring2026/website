<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="static/styles.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Exam - Florida Security Clinic</title>
</head>
<body>
	<h1>Exam</h1>
	<p class="exam_preamble">For each question, choose the correct answer. Press submit when complete. <br> 
	Do not navigate away from this page. If you do, your answers will not be saved.</p>
	<form action="exam-submit" method="post">
	{% for questionno, question, answers in questions %}
		<p>Q: {{ question }}</p>
		{% for answerno, answer in answers %}
			<p><input type="radio" id="q{{ questionno }}a{{ answerno }}" name="q{{ questionno }}" value="a{{ answerno }}"><label for="q{{ questionno }}a{{ answerno }}">{{ answer }}</label></p>
		{% endfor %}
	{% endfor %}
	<p><input type="submit" value="Submit" />
	</form>
</body>
</html>
